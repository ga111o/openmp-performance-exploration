parameters:
  - name: hyperparameters/work_sharing
    type: discrete
    values: [false_sharing, false_sharing_padded]

  - name: hyperparameters/schedule_kind
    type: discrete
    values: [static]

  - name: hyperparameters/schedule_chunk
    type: discrete
    values: [0]

  - name: hyperparameters/task_chunk_size
    type: discrete
    values: [0]

  - name: hyperparameters/num_threads
    type: discrete
    values: [2, 3, 4, 5, 6, 8, 12]

  - name: hyperparameters/proc_bind
    type: discrete
    values: ["close", "spread"]

  - name: hyperparameters/places
    type: discrete
    values: [cores]

  - name: hyperparameters/wait_policy
    type: discrete
    values: [active]

  - name: hyperparameters/dynamic
    type: discrete
    values: ["false"]

  - name: hyperparameters/iterations
    type: discrete
    values: [1000, 10000, 100000, 1000000, 10000000]

  - name: hyperparameters/cpu_set
    type: discrete
    values: ["0-11"]
